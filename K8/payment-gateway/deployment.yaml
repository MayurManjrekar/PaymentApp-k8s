apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: payment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: payment-gateway:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080

        env:
        - name: PAYMENT_PROCESSOR_URL
          valueFrom:
            configMapKeyRef:
              name: payment-config
              key: PAYMENT_PROCESSOR_URL

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10